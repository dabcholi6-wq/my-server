<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>کدهای دسترسی</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
    .header { background: #16213e; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
    .header h1 { color: #e94560; }
    .btn { background: #e94560; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; margin: 3px; }
    .btn-red { background: #d63031; }
    .btn-green { background: #00b894; }
    .btn-yellow { background: #fdcb6e; color: #333; }
    .card { background: #16213e; padding: 20px; border-radius: 10px; margin: 15px 0; }
    .code-box { background: #0f3460; padding: 15px; border-radius: 8px; margin: 15px 0; text-align: center; font-size: 22px; letter-spacing: 3px; color: #00b894; font-weight: bold; }
    .active { color: #00b894; }
    .inactive { color: #d63031; }
    select, input { padding: 10px; margin: 8px 0; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: white; width: 100%; font-size: 14px; }
    .modal { background: #16213e; padding: 25px; border-radius: 10px; max-width: 500px; margin: 30px auto; }
    .modal h2 { color: #e94560; margin-bottom: 20px; }
    a { color: #e94560; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔑 مدیریت کدهای دسترسی</h1>
    <a href="/dashboard.html">🏠 بازگشت</a>
  </div>

  <div class="modal">
    <h2>ساخت کد جدید</h2>
    <select id="bundleSelect"><option value="">انتخاب پوشه...</option></select>
    <select id="userSelect"><option value="">انتخاب کاربر...</option></select>
    <input type="date" id="expiresAt">
    <button class="btn btn-green" onclick="createCode()">🔑 ساخت کد</button>
  </div>

  <h2>📋 کدهای ساخته شده</h2>
  <div id="codeList"></div>

  <script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login.html";

    loadData();

    async function loadData() {
      const [bundlesRes, usersRes, codesRes] = await Promise.all([
        fetch("/api/bundles", { headers: { "Authorization": "Bearer " + token } }),
        fetch("/api/users", { headers: { "Authorization": "Bearer " + token } }),
        fetch("/api/access-codes", { headers: { "Authorization": "Bearer " + token } })
      ]);
      
      const bundles = await bundlesRes.json();
      const users = await usersRes.json();
      const codes = await codesRes.json();
      
      document.getElementById("bundleSelect").innerHTML = '<option value="">انتخاب پوشه...</option>' + bundles.map(b => `<option value="${b._id}">${b.title}</option>`).join("");
      document.getElementById("userSelect").innerHTML = '<option value="">انتخاب کاربر...</option>' + users.map(u => `<option value="${u._id}">${u.name || u.email}</option>`).join("");
      
      document.getElementById("codeList").innerHTML = codes.map(c => `
        <div class="card">
          <h3>📦 ${c.bundleId?.title || "نامشخص"} ← 👤 ${c.userId?.name || c.userId?.email || "نامشخص"}</h3>
          <div class="code-box">${c.code}</div>
          <p>وضعیت: <span class="${c.isActive ? 'active' : 'inactive'}">${c.isActive ? '✅ فعال' : '❌ غیرفعال'}</span> | ${c.isUsed ? '✅ استفاده شده' : '⏳ استفاده نشده'}</p>
          ${c.expiresAt ? '<p>⏰ انقضا: ' + new Date(c.expiresAt).toLocaleDateString("fa-IR") + '</p>' : ''}
          <button class="btn btn-yellow" onclick="toggleCode('${c._id}')">${c.isActive ? 'غیرفعال' : 'فعال'} کردن</button>
          <button class="btn btn-red" onclick="deleteCode('${c._id}')">🗑️ حذف</button>
        </div>
      `).join("") || "<p>هیچ کدی ساخته نشده</p>";
    }

    async function createCode() {
      const bundleId = document.getElementById("bundleSelect").value;
      const userId = document.getElementById("userSelect").value;
      const expiresAt = document.getElementById("expiresAt").value;
      
      if(!bundleId || !userId) return alert("پوشه و کاربر را انتخاب کنید!");
      
      const res = await fetch("/api/access-codes", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
        body: JSON.stringify({ bundleId, userId, expiresAt: expiresAt || null })
      });
      
      const data = await res.json();
      if(data.code) { alert("✅ کد ساخته شد: " + data.code); loadData(); }
      else { alert("❌ " + (data.error || "خطا")); }
    }

    async function toggleCode(id) {
      await fetch("/api/access-codes/" + id + "/toggle", {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token }
      });
      loadData();
    }

    async function deleteCode(id) {
      if(!confirm("مطمئنی می‌خوای حذف کنی؟")) return;
      await fetch("/api/access-codes/" + id, {
        method: "DELETE",
        headers: { "Authorization": "Bearer " + token }
      });
      loadData();
    }
  </script>
</body>
</html>
