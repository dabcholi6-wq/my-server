<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden org</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
    .header { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 30px; }
    .header h1 { color: #FFB300; font-size: 24px; }
    .section { background: #16213e; padding: 25px; border-radius: 10px; margin: 20px 0; }
    .section h2 { color: #e94560; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: white; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    .status { color: #ff6b6b; text-align: center; margin-top: 10px; }
    .success { color: #00b894; }
    a { color: #2196F3; text-decoration: none; }
    video { width: 100%; border-radius: 8px; margin-top: 10px; }
    hr { border-color: #0f3460; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎵 Golden org</h1>
    <p>پلتفرم آموزش ارگ</p>
  </div>

  <div class="section" id="loginSection">
    <h2>🔐 ورود</h2>
    <input type="email" id="loginEmail" placeholder="ایمیل">
    <input type="password" id="loginPassword" placeholder="رمز عبور">
    <button onclick="loginUser()">ورود</button>
    <p class="status" id="loginStatus"></p>
    <p style="text-align:center;margin-top:10px;">حساب نداری؟ <a href="#" onclick="showRegister()">ثبت‌نام</a></p>
  </div>

  <div class="section" id="registerSection" style="display:none;">
    <h2>📝 ثبت‌نام</h2>
    <input type="text" id="regName" placeholder="نام">
    <input type="email" id="regEmail" placeholder="ایمیل">
    <input type="text" id="regPhone" placeholder="شماره">
    <input type="password" id="regPassword" placeholder="رمز عبور">
    <button onclick="registerUser()">ثبت‌نام</button>
    <p class="status" id="regStatus"></p>
    <p style="text-align:center;margin-top:10px;">حساب داری؟ <a href="#" onclick="showLogin()">ورود</a></p>
  </div>

  <div class="section" id="codeSection" style="display:none;">
    <h2>🔑 فعال‌سازی کد</h2>
    <input type="text" id="accessCode" placeholder="کد دسترسی را وارد کنید">
    <button onclick="activateCode()">فعال‌سازی</button>
    <p class="status" id="codeStatus"></p>
  </div>

  <div class="section" id="bundlesSection" style="display:none;">
    <h2>📦 دوره‌ها</h2>
    <div id="myBundles"></div>
  </div>

  <button onclick="logout()" style="background:#d63031;margin-top:20px;width:100%;padding:12px;color:white;border:none;border-radius:8px;font-size:18px;display:none;" id="logoutBtn">خروج</button>

  <script>
    let token = localStorage.getItem("token");

    function showRegister() {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("registerSection").style.display = "block";
    }
    function showLogin() {
      document.getElementById("registerSection").style.display = "none";
      document.getElementById("loginSection").style.display = "block";
    }

    async function loginUser() {
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const status = document.getElementById("loginStatus");
      if(!email || !password) { status.textContent = "فیلدها را پر کنید"; return; }
      try {
        const res = await fetch("/api/users/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if(data.token) {
          token = data.token;
          localStorage.setItem("token", token);
          status.textContent = "✅ ورود موفق!";
          status.className = "status success";
          showUserPanel();
        } else {
          status.textContent = "❌ " + (data.error || "خطا");
        }
      } catch(e) { status.textContent = "❌ خطا در اتصال"; }
    }

    async function registerUser() {
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const phone = document.getElementById("regPhone").value;
      const password = document.getElementById("regPassword").value;
      const status = document.getElementById("regStatus");
      if(!name || !email || !password) { status.textContent = "فیلدهای ضروری را پر کنید"; return; }
      try {
        const res = await fetch("/api/users/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, phone, password })
        });
        const data = await res.json();
        if(data.token) {
          token = data.token;
          localStorage.setItem("token", token);
          status.textContent = "✅ ثبت‌نام موفق!";
          status.className = "status success";
          showUserPanel();
        } else {
          status.textContent = "❌ " + (data.error || "خطا");
        }
      } catch(e) { status.textContent = "❌ خطا در اتصال"; }
    }

    async function activateCode() {
      const code = document.getElementById("accessCode").value;
      const status = document.getElementById("codeStatus");
      if(!code) { status.textContent = "کد را وارد کنید"; return; }
      try {
        const res = await fetch("/api/activate-code", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        if(data.message) {
          status.textContent = "✅ " + data.message;
          status.className = "status success";
          document.getElementById("codeSection").style.display = "none";
          loadSingleBundle(data.bundleId);
        } else {
          status.textContent = "❌ " + (data.error || "کد نامعتبر");
        }
      } catch(e) { status.textContent = "❌ خطا در اتصال"; }
    }

    async function loadSingleBundle(bundleId) {
      try {
        const videosRes = await fetch("/api/bundles/" + bundleId + "/videos", {
          headers: { "Authorization": "Bearer " + token }
        });
        const videos = await videosRes.json();
        
        const bundlesRes = await fetch("/api/my-bundles", {
          headers: { "Authorization": "Bearer " + token }
        });
        const bundles = await bundlesRes.json();
        const bundle = bundles.find(b => b._id === bundleId);
        
        let html = `
          <div style="background:#16213e;padding:25px;border-radius:15px;text-align:center;">
            <h2 style="color:#FFB300;">📦 ${bundle?.title || "دوره آموزشی"}</h2>
            <p style="color:#aaa;">${bundle?.description || ""}</p>
            <hr>
        `;
        
        videos.forEach(v => {
          html += `
            <div style="background:#0f3460;padding:15px;border-radius:10px;margin:10px 0;">
              <h3 style="color:#e94560;">#${v.order} - ${v.title}</h3>
              <video controls controlsList="nodownload" oncontextmenu="return false" style="width:100%;border-radius:8px;margin-top:10px;">
                <source src="/stream/${v._id}/master.m3u8" type="application/x-mpegURL">
              </video>
            </div>
          `;
        });
        
        html += `</div>`;
        
        document.getElementById("myBundles").innerHTML = html;
        document.getElementById("bundlesSection").style.display = "block";
      } catch(e) {}
    }

    function showUserPanel() {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("registerSection").style.display = "none";
      document.getElementById("codeSection").style.display = "block";
      document.getElementById("bundlesSection").style.display = "block";
      document.getElementById("logoutBtn").style.display = "block";
    }

    function logout() {
      localStorage.removeItem("token");
      token = null;
      location.reload();
    }

    if(token) showUserPanel();
  </script>
</body>
      </html>
