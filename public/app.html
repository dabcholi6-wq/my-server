<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden org</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 20px; }
    .header { background: #16213e; padding: 20px; border-radius: 10px; text-align: center; margin-bottom: 30px; }
    .header h1 { color: #FFB300; font-size: 24px; }
    .section { background: #16213e; padding: 25px; border-radius: 10px; margin: 20px 0; }
    .section h2 { color: #e94560; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: white; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    .video-card { background: #0f3460; padding: 15px; border-radius: 8px; margin: 10px 0; }
    .video-card h3 { margin-bottom: 5px; }
    .status { color: #ff6b6b; text-align: center; margin-top: 10px; }
    .success { color: #00b894; }
    .btn-green { background: #00b894; }
    .btn-blue { background: #2196F3; }
    a { color: #2196F3; text-decoration: none; }
    video { width: 100%; border-radius: 8px; margin-top: 10px; }
    video::-webkit-media-controls-download-button { display: none !important; }
    video::-webkit-media-controls-fullscreen-button { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎵 Golden org</h1>
    <p>پلتفرم آموزش ارگ</p>
  </div>

  <!-- ورود -->
  <div class="section" id="loginSection">
    <h2>🔐 ورود</h2>
    <input type="email" id="loginEmail" placeholder="ایمیل">
    <input type="password" id="loginPassword" placeholder="رمز عبور">
    <button onclick="loginUser()">ورود</button>
    <p class="status" id="loginStatus"></p>
    <p style="text-align:center;margin-top:10px;">حساب نداری؟ <a href="#" onclick="showRegister()">ثبت‌نام</a></p>
  </div>

  <!-- ثبت‌نام -->
  <div class="section" id="registerSection" style="display:none;">
    <h2>📝 ثبت‌نام</h2>
    <input type="text" id="regName" placeholder="نام">
    <input type="email" id="regEmail" placeholder="ایمیل">
    <input type="text" id="regPhone" placeholder="شماره">
    <input type="password" id="regPassword" placeholder="رمز عبور">
    <button onclick="registerUser()">ثبت‌نام</button>
    <p class="status" id="regStatus"></p>
    <p style="text-align:center;margin-top:10px;">حساب داری؟ <a href="#" onclick="showLogin()">ورود</a></p>
  </div>

  <!-- کد دسترسی -->
  <div class="section" id="codeSection" style="display:none;">
    <h2>🔑 فعال‌سازی کد</h2>
    <input type="text" id="accessCode" placeholder="کد دسترسی را وارد کنید">
    <button onclick="activateCode()">فعال‌سازی</button>
    <p class="status" id="codeStatus"></p>
  </div>

  <!-- پوشه‌های من -->
  <div class="section" id="bundlesSection" style="display:none;">
    <h2>📦 دوره‌های من</h2>
    <div id="myBundles"></div>
  </div>

  <!-- ویدیوها -->
  <div class="section" id="videosSection" style="display:none;">
    <h2>🎥 ویدیوها</h2>
    <div id="videoList"></div>
  </div>

  <button onclick="logout()" style="background:#d63031;margin-top:20px;width:100%;" id="logoutBtn" style="display:none;">خروج</button>

  <script>
    let token = localStorage.getItem("token");

    function showRegister() {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("registerSection").style.display = "block";
    }
    function showLogin() {
      document.getElementById("registerSection").style.display = "none";
      document.getElementById("loginSection").style.display = "block";
    }

    async function loginUser() {
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const status = document.getElementById("loginStatus");
      if(!email || !password) { status.textContent = "فیلدها را پر کنید"; return; }
      try {
        const res = await fetch("/api/users/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if(data.token) {
          token = data.token;
          localStorage.setItem("token", token);
          status.textContent = "✅ ورود موفق!";
          status.className = "status success";
          showUserPanel();
        } else {
          status.textContent = "❌ " + (data.error || "خطا در ورود");
        }
      } catch(e) { status.textContent = "❌ خطا در اتصال"; }
    }

    async function registerUser() {
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const phone = document.getElementById("regPhone").value;
      const password = document.getElementById("regPassword").value;
      const status = document.getElementById("regStatus");
      if(!name || !email || !password) { status.textContent = "فیلدهای ضروری را پر کنید"; return; }
      try {
        const res = await fetch("/api/users/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, phone, password })
        });
        const data = await res.json();
        if(data.token) {
          token = data.token;
          localStorage.setItem("token", token);
          status.textContent = "✅ ثبت‌نام موفق!";
          status.className = "status success";
          showUserPanel();
        } else {
          status.textContent = "❌ " + (data.error || "خطا در ثبت‌نام");
        }
      } catch(e) { status.textContent = "❌ خطا در اتصال"; }
    }

    async function activateCode() {
      const code = document.getElementById("accessCode").value;
      const status = document.getElementById("codeStatus");
      if(!code) { status.textContent = "کد را وارد کنید"; return; }
      try {
        const res = await fetch("/api/activate-code", {
          method: "POST",
          headers: { 
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        if(data.message) {
          status.textContent = "✅ " + data.message;
          status.className = "status success";
          document.getElementById("codeSection").style.display = "none";
          loadMyBundles();
          document.getElementById("bundlesSection").style.display = "block";
        } else {
          status.textContent = "❌ " + (data.error || "کد نامعتبر");
        }
      } catch(e) { status.textContent = "❌ خطا در اتصال"; }
    }

    async function loadMyBundles() {
      try {
        const res = await fetch("/api/my-bundles", {
          headers: { "Authorization": "Bearer " + token }
        });
        const bundles = await res.json();
        const html = bundles.map(b => `
          <div class="video-card">
            <h3>${b.title}</h3>
            <p>${b.description || ""}</p>
            <button class="btn-blue" onclick="loadVideos('${b._id}')">🎥 مشاهده ویدیوها</button>
          </div>
        `).join("");
        document.getElementById("myBundles").innerHTML = html || "<p>هنوز دوره‌ای فعال نشده. کد دسترسی را وارد کنید.</p>";
        document.getElementById("bundlesSection").style.display = "block";
      } catch(e) {}
    }

    async function loadVideos(bundleId) {
      try {
        const res = await fetch("/api/bundles/" + bundleId + "/videos", {
          headers: { "Authorization": "Bearer " + token }
        });
        const videos = await res.json();
        const html = videos.map(v => `
          <div class="video-card">
            <h3>#${v.order} - ${v.title}</h3>
            <video controls controlsList="nodownload" disablePictureInPicture oncontextmenu="return false" playsinline>
              <source src="/stream/${v._id}/master.m3u8" type="application/x-mpegURL">
              مرورگر شما از پخش ویدیو پشتیبانی نمی‌کند.
            </video>
          </div>
        `).join("");
        document.getElementById("videoList").innerHTML = html;
        document.getElementById("videosSection").style.display = "block";
      } catch(e) {}
    }

    function showUserPanel() {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("registerSection").style.display = "none";
      document.getElementById("codeSection").style.display = "block";
      document.getElementById("logoutBtn").style.display = "block";
      loadMyBundles();
    }

    function logout() {
      localStorage.removeItem("token");
      token = null;
      location.reload();
    }

    // چک خودکار لاگین
    if(token) showUserPanel();
  </script>
</body>
  </html>
