<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Golden org</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Vazirmatn', Arial, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; padding: 20px; min-height: 100vh; }
    .header { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; text-align: center; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.1); }
    .header h1 { color: #FFB300; font-size: 28px; font-weight: 700; }
    .header p { color: #aaa; margin-top: 5px; }
    .section { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.05); }
    .section h2 { color: #FFB300; margin-bottom: 20px; font-size: 20px; }
    input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(255,255,255,0.05); color: white; font-size: 16px; transition: 0.3s; }
    input:focus { border-color: #FFB300; outline: none; }
    button { width: 100%; padding: 14px; background: linear-gradient(135deg, #e94560, #c0392b); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(233,69,96,0.3); }
    .status { color: #ff6b6b; text-align: center; margin-top: 10px; }
    .success { color: #00b894; }
    a { color: #FFB300; text-decoration: none; font-weight: 700; }
    video { width: 100%; border-radius: 15px; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    hr { border-color: rgba(255,255,255,0.1); margin: 20px 0; }
    .bundle-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin: 15px 0; border: 1px solid rgba(255,255,255,0.1); }
    .bundle-card h3 { color: #FFB300; margin-bottom: 10px; }
    .video-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.05); }
    .video-item h4 { color: #e94560; margin-bottom: 10px; }
    .btn-outline { background: transparent; border: 2px solid #FFB300; color: #FFB300; }
    .btn-outline:hover { background: #FFB300; color: #1a1a2e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎵 Golden org</h1>
    <p>پلتفرم تخصصی آموزش ارگ</p>
  </div>

  <div class="section" id="loginSection">
    <h2>🔐 ورود به حساب</h2>
    <input type="email" id="loginEmail" placeholder="ایمیل خود را وارد کنید">
    <input type="password" id="loginPassword" placeholder="رمز عبور">
    <button onclick="loginUser()">ورود</button>
    <p class="status" id="loginStatus"></p>
    <p style="text-align:center;margin-top:15px;">حساب ندارید؟ <a href="#" onclick="showRegister()">ثبت‌نام کنید</a></p>
  </div>

  <div class="section" id="registerSection" style="display:none;">
    <h2>📝 ساخت حساب جدید</h2>
    <input type="text" id="regName" placeholder="نام و نام خانوادگی">
    <input type="email" id="regEmail" placeholder="ایمیل">
    <input type="text" id="regPhone" placeholder="شماره موبایل">
    <input type="password" id="regPassword" placeholder="رمز عبور">
    <button onclick="registerUser()">ثبت‌نام</button>
    <p class="status" id="regStatus"></p>
    <p style="text-align:center;margin-top:15px;">حساب دارید؟ <a href="#" onclick="showLogin()">ورود</a></p>
  </div>

  <div class="section" id="codeSection" style="display:none;">
    <h2>🔑 فعال‌سازی کد دسترسی</h2>
    <input type="text" id="accessCode" placeholder="کد اختصاصی خود را وارد کنید">
    <button onclick="activateCode()">فعال‌سازی</button>
    <p class="status" id="codeStatus"></p>
  </div>

  <div class="section" id="bundlesSection" style="display:none;">
    <h2>📦 دوره‌های آموزشی شما</h2>
    <div id="myBundles"></div>
  </div>

  <button onclick="logout()" class="btn-outline" style="margin-top:20px;width:100%;display:none;" id="logoutBtn">🚪 خروج از حساب</button>

  <script>
    let token = localStorage.getItem("token");

    function showRegister() { document.getElementById("loginSection").style.display = "none"; document.getElementById("registerSection").style.display = "block"; }
    function showLogin() { document.getElementById("registerSection").style.display = "none"; document.getElementById("loginSection").style.display = "block"; }

    async function loginUser() {
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;
      const status = document.getElementById("loginStatus");
      if(!email || !password) { status.textContent = "❌ لطفاً همه فیلدها را پر کنید"; return; }
      try {
        const res = await fetch("/api/users/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
        const data = await res.json();
        if(data.token) {
          token = data.token;
          localStorage.setItem("token", token);
          status.textContent = "✅ خوش آمدید!";
          status.className = "status success";
          showUserPanel();
        } else { status.textContent = "❌ " + (data.error || "ایمیل یا رمز اشتباه"); }
      } catch(e) { status.textContent = "❌ خطا در اتصال به سرور"; }
    }

    async function registerUser() {
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const phone = document.getElementById("regPhone").value;
      const password = document.getElementById("regPassword").value;
      const status = document.getElementById("regStatus");
      if(!name || !email || !password) { status.textContent = "❌ فیلدهای ضروری را پر کنید"; return; }
      try {
        const res = await fetch("/api/users/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, email, phone, password }) });
        const data = await res.json();
        if(data.token) {
          token = data.token;
          localStorage.setItem("token", token);
          status.textContent = "✅ ثبت‌نام موفق!";
          status.className = "status success";
          showUserPanel();
        } else { status.textContent = "❌ " + (data.error || "خطا"); }
      } catch(e) { status.textContent = "❌ خطا در اتصال"; }
    }

    async function activateCode() {
      const code = document.getElementById("accessCode").value;
      const status = document.getElementById("codeStatus");
      if(!code) { status.textContent = "❌ کد را وارد کنید"; return; }
      try {
        const res = await fetch("/api/activate-code", { method: "POST", headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token }, body: JSON.stringify({ code }) });
        const data = await res.json();
        if(data.message) {
          status.textContent = "✅ " + data.message;
          status.className = "status success";
          document.getElementById("codeSection").style.display = "none";
          loadSingleBundle(data.bundleId);
        } else { status.textContent = "❌ " + (data.error || "کد نامعتبر"); }
      } catch(e) { status.textContent = "❌ خطا"; }
    }

    async function loadSingleBundle(bundleId) {
      try {
        const videosRes = await fetch("/api/bundles/" + bundleId + "/videos", { headers: { "Authorization": "Bearer " + token } });
        const videos = await videosRes.json();
        const bundlesRes = await fetch("/api/my-bundles", { headers: { "Authorization": "Bearer " + token } });
        const bundles = await bundlesRes.json();
        const bundle = bundles.find(b => b._id === bundleId);
        
        let html = `
          <div class="bundle-card" style="text-align:center;">
            <h2 style="color:#FFB300;font-size:22px;">📦 ${bundle?.title || "دوره آموزشی"}</h2>
            <p style="color:#aaa;margin:10px 0;">${bundle?.description || ""}</p>
            <hr>
        `;
        videos.forEach(v => {
          html += `
            <div class="video-item">
              <h4>🎬 ${v.title}</h4>
              <video controls controlsList="nodownload" oncontextmenu="return false" playsinline>
                <source src="/stream/${v._id}">
              </video>
            </div>
          `;
        });
        html += `</div>`;
        document.getElementById("myBundles").innerHTML = html;
        document.getElementById("bundlesSection").style.display = "block";
      } catch(e) {}
    }

    function showUserPanel() {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("registerSection").style.display = "none";
      document.getElementById("codeSection").style.display = "block";
      document.getElementById("bundlesSection").style.display = "block";
      document.getElementById("logoutBtn").style.display = "block";
    }

    function logout() { localStorage.removeItem("token"); token = null; location.reload(); }
    if(token) showUserPanel();
  </script>
</body>
      </html>
