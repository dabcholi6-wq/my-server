<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>آپلود ویدیو</title>
  <style>
    body { background: #1a1a2e; color: white; font-family: Arial; padding: 20px; }
    input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; }
    button { background: #e94560; color: white; cursor: pointer; }
    select, input[type=file] { background: #0f3460; color: white; border: 1px solid #0f3460; }
    .msg { margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <h2>🎥 آپلود ویدیو</h2>
  <select id="bundleSelect"><option value="">انتخاب پوشه...</option></select>
  <input type="text" id="videoTitle" placeholder="عنوان ویدیو">
  <input type="number" id="videoOrder" placeholder="ترتیب" value="1">
  <input type="file" id="videoFile" accept="video/mp4">
  <button onclick="uploadVideo()">📤 آپلود</button>
  <p class="msg" id="msg"></p>

  <script>
    const token = localStorage.getItem("token");
    if(!token) window.location.href = "/login.html";

    fetch("/api/bundles", { headers: { "Authorization": "Bearer " + token } })
      .then(r => r.json())
      .then(b => {
        document.getElementById("bundleSelect").innerHTML = '<option value="">انتخاب پوشه...</option>' + b.map(x => `<option value="${x._id}">${x.title}</option>`).join("");
      });

    async function uploadVideo() {
      const bundleId = document.getElementById("bundleSelect").value;
      const title = document.getElementById("videoTitle").value;
      const order = document.getElementById("videoOrder").value;
      const file = document.getElementById("videoFile").files[0];
      const msg = document.getElementById("msg");
      
      if(!bundleId || !title || !file) { msg.textContent = "❌ همه فیلدها را پر کنید"; return; }
      
      msg.textContent = "⏳ در حال آپلود...";
      
      const fd = new FormData();
      fd.append("video", file);
      fd.append("bundleId", bundleId);
      fd.append("title", title);
      fd.append("order", order);
      
      try {
        const res = await fetch("/api/videos", {
          method: "POST",
          headers: { "Authorization": "Bearer " + token },
          body: fd
        });
        const data = await res.json();
        if(data.video) {
          msg.textContent = "✅ آپلود شد!";
        } else {
          msg.textContent = "❌ " + (data.error || "خطا");
        }
      } catch(e) {
        msg.textContent = "❌ خطا: " + e.message;
      }
    }
  </script>
</body>
</html>
