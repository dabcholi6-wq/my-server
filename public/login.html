<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ورود به پنل مدیریت</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .login-box { background: #16213e; padding: 40px; border-radius: 15px; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    h2 { color: #e94560; text-align: center; margin-bottom: 30px; font-size: 24px; }
    input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #0f3460; border-radius: 8px; background: #0f3460; color: white; font-size: 16px; }
    button { width: 100%; padding: 12px; background: #e94560; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; }
    button:hover { background: #c73c54; }
    .error { color: #ff6b6b; text-align: center; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 ورود به پنل مدیریت</h2>
    <input type="email" id="email" placeholder="ایمیل">
    <input type="password" id="password" placeholder="رمز عبور">
    <button onclick="login()">ورود</button>
    <p class="error" id="error"></p>
  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("error");
      
      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (data.token) {
          localStorage.setItem("token", data.token);
          window.location.href = "/dashboard.html";
        } else {
          error.textContent = "❌ ایمیل یا رمز عبور اشتباه است";
        }
      } catch (err) {
        error.textContent = "❌ خطا در اتصال به سرور";
      }
    }
  </script>
</body>
</html>
